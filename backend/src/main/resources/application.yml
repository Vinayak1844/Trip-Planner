spring:
  application:
    name: ai-trip-planner

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tripplanner}
    username: ${SPRING_DATASOURCE_USERNAME:tripplanner}
    password: ${SPRING_DATASOURCE_PASSWORD:tripplanner}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-at-least-256-bits-for-dev-only}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    com.tripplanner: INFO
    org.springframework.security: WARN
